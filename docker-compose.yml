services:
  job-automation:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-automation:latest
    container_name: job-automation
    restart: unless-stopped
    environment:
      - TZ=${LOCAL_TIMEZONE:-America/Los_Angeles}
    volumes:
      - ./data:/home/node/data
      - ./artifacts:/home/node/artifacts
      - ./config:/home/node/config:ro
      - ./prompts:/home/node/prompts:ro
      - ./schemas:/home/node/schemas:ro
      - ./scripts:/home/node/scripts:ro
      - ./.env:/home/node/.env:ro
    healthcheck:
      test: ["CMD-SHELL", "grep -ql '^cron$' /proc/[0-9]*/comm"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    image: job-automation-dashboard:latest
    container_name: job-automation-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - TZ=${LOCAL_TIMEZONE:-America/Los_Angeles}
    volumes:
      - ./config:/app/config
      - ./data:/app/data:ro
      - ./schemas:/app/schemas:ro
      - ./prompts:/app/prompts:ro
